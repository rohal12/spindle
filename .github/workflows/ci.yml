name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install --frozen-lockfile

      - name: Build (fail on warnings)
        run: |
          bun run build 2>&1 | tee build.log
          if grep -qi 'warning' build.log; then
            echo "::error::Build produced warnings"
            exit 1
          fi

      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: bun run test:coverage

      - name: Run tests
        if: matrix.node-version != 22
        run: bun run test

      - name: Coverage report
        if: matrix.node-version == 22 && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          vite-config-path: vitest.config.ts

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build and compile story
        run: bun run preview

      - name: Run e2e tests
        run: bun run test:e2e
        timeout-minutes: 3
