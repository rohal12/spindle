name: "Dark corridor: damage and key path"
steps:
  # Start
  - assert:
      passage: Start

  # Go to the Room to pick up the key
  - action: "link:Room"
  - assert:
      passage: Room
      variables:
        has_key: false
      actions:
        - type: link
          target: Take Key
        - type: link
          target: Note
        - type: link
          target: Hallway

  # Take the key
  - action: "link:Take Key"
  - assert:
      passage: Take Key
      variables:
        has_key: true

  # Go back to Room
  - action: "link:Room"
  - assert:
      passage: Room
      # Key link should no longer appear (conditional)
      actions:
        - type: link
          target: Note
        - type: link
          target: Hallway

  # Read the note
  - action: "link:Note"
  - assert:
      passage: Note
      variables:
        has_note: true

  # Back to Room, then to Hallway
  - action: "link:Room"
  - action: "link:Hallway"
  - assert:
      passage: Hallway

  # Enter the Dark Corridor (takes 10 damage via $player.damage(10))
  - action: "link:Dark Corridor"
  - assert:
      passage: Dark Corridor
      actions:
        # With key, we should see both options
        - type: link
          target: Secret Room

  # Enter Secret Room
  - action: "link:Secret Room"
  - assert:
      passage: Secret Room
      actions:
        - type: link
          target: Ending
        - type: link
          target: Dark Corridor

  # Touch the orb -> Ending
  - action: "link:Ending"
  - assert:
      passage: Ending
