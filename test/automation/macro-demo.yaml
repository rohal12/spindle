name: 'Macro demo: buttons and counter'
steps:
  # Start
  - assert:
      passage: Start

  # Navigate to Macro Demo
  - action: 'link:Macro Demo'
  - assert:
      passage: Macro Demo
      variables:
        demo_ran: true
        count: 0

  # Verify button actions exist
  - assert:
      actions:
        - type: button
        - type: link
          target: Start

  # Increment the counter using the +1 button
  - action: 'button:$count = $count + 1'
  - assert:
      passage: Macro Demo
      variables:
        count: 1

  # Increment again
  - action: 'button:$count = $count + 1'
  - assert:
      variables:
        count: 2
